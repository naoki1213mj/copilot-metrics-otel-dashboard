name: copilot-metrics-dashboard
metadata:
  template: copilot-metrics-dashboard
services:
  dashboard:
    project: ./dashboard
    language: js
    host: appservice
    dist: deploy
    config:
      packageManager: npm
    hooks:
      prepackage:
        shell: pwsh
        run: |
          if (-not (Test-Path node_modules)) {
            npm ci
          }
          npm run build
  ingestion:
    project: .
    language: py
    host: function
    hooks:
      prepackage:
        shell: pwsh
        run: uv export --no-dev --no-hashes --format requirements-txt -o requirements.txt
